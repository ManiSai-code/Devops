name: Continuous Improvement Pipeline

on: [push]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install Dependencies
        # This step is CRITICAL. It installs mocha in the cloud.
        run: npm install 
        
      - name: Run Quality Gate (Logic Only)
        # We use 'npx mocha' to ensure it finds the installed tool
        run: npx mocha test.js --exit -g "should load the homepage successfully"

      - name: Build Docker Image
        run: docker build -t devops-app .