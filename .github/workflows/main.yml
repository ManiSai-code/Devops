name: Continuous Improvement Pipeline

on: [push]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Run Quality Gate (App Logic Only)
        run: npm test -- -g "should load the homepage successfully"
        
      - name: Run Quality Gate (Tests)
        run: npm test
        
      - name: Build Docker Image (Cloud Build)
        run: docker build -t devops-improvement-app .